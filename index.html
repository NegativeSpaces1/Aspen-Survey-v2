    <style>
        :root {
            --bg-color: #fcfaf7;         /* Soft Aspen Bark White */
            --panel-bg: #ffffff;         /* Pure White */
            --primary-brown: #7c604d;    /* Deep Aspen Branch Brown */
            --light-brown: #a98f7e;      /* Soft Warm Earth Brown */
            --accent-tan: #f3ede6;       /* Creamy Accent Tone */
            --text-dark: #4a3e3d;        /* Soft Charcoal-Brown Text */
            --success-green: #7ca982;    /* Cutesy Pastel Sage Green */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            background: var(--panel-bg);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(124, 96, 77, 0.08);
            border: 1px solid var(--accent-tan);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.6rem;
            color: var(--primary-brown);
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        header p.subtitle {
            font-size: 0.85rem;
            color: var(--light-brown);
            font-weight: 500;
        }

        header::after {
            content: '🌿 ✨ 🌿';
            display: block;
            font-size: 1rem;
            margin-top: 10px;
            letter-spacing: 4px;
        }

        .section-banner {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-brown);
            background: var(--accent-tan);
            padding: 8px 16px;
            border-radius: 12px;
            margin: 30px 0 15px 0;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 20px;
            background: #fff;
            border: 1.5px solid var(--accent-tan);
            padding: 18px;
            border-radius: 18px;
            transition: all 0.3s ease;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: var(--primary-brown);
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-color);
            border: 1px solid var(--accent-tan);
            color: var(--text-dark);
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
            display: block;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--light-brown);
            background: #fff;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 35px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-submit {
            background: var(--primary-brown);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(124, 96, 77, 0.2);
        }

        .btn-submit:hover {
            background: #654e3e;
        }

        .btn-download {
            background: var(--accent-tan);
            color: var(--primary-brown);
        }

        .status-msg {
            margin-top: 18px;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
            min-height: 25px;
        }

        optgroup {
            font-weight: bold;
            color: var(--primary-brown);
            background: #fff;
        }
        
        option {
            color: var(--text-dark);
            font-weight: normal;
        }
    </style>
