<html lang="en">

        :root {
            --bg-color: #fff5f7;         /* Super Cutesy Sweet Strawberry Milk Pink */
            --panel-bg: #ffffff;         /* Pure White Cloud */
            --primary-pink: #ff8fa3;     /* Bright Soft Rose Accent */
            --light-pink: brown;       /* Pastel Candy Pink */
            --accent-cream: #fff0f3;     /* Whipped Cream Soft Background */
            --text-dark: #4a373b;        /* Soft Velvet Cocoa Dark Text */
            --success-green: #a3ccab;    /* Sweet Matcha Pastel Green */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            background: var(--panel-bg);
            border-radius: 28px;
            padding: 30px 20px;
            box-shadow: 0 12px 35px rgba(255, 143, 163, 0.12);
            border: 2px solid var(--accent-cream);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--primary-pink);
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        header p.subtitle {
            font-size: 0.9rem;
            color: var(--light-pink);
            font-weight: 600;
        }

        header::after {
            content: '🌲🍁Aspen Survey';
            display: block;
            font-size: 1rem;
            margin-top: 10px;
            letter-spacing: 4px;
        }

        .section-banner {
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
            background: var(--primary-pink);
            padding: 8px 18px;
            border-radius: 20px;
            margin: 25px 0 15px 0;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(255, 143, 163, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
            background: #fff;
            border: 2px solid var(--accent-cream);
            padding: 18px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .form-group:focus-within {
            border-color: var(--light-pink);
            box-shadow: 0 4px 12px rgba(255, 179, 193, 0.15);
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-color);
            border: 1.5px solid var(--accent-cream);
            color: var(--text-dark);
            border-radius: 14px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
            display: block;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary-pink);
            background: #fff;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 35px;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-submit {
            background: var(--primary-pink);
            color: #ffffff;
            box-shadow: 0 5px 15px rgba(255, 143, 163, 0.3);
        }

        .btn-submit:hover {
            background: #ff758f;
            transform: translateY(-1px);
        }

        .status-msg {
            margin-top: 18px;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 600;
            min-height: 25px;
        }

        optgroup {
            font-weight: bold;
            color: var(--primary-pink);
            background: #fff;
        }
        
        option {
            color: var(--text-dark);
            font-weight: normal;
        }

        /* Invisible Container for rendering the Beautiful Image Receipt */
        #receiptCaptureWrapper {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }
        .receipt-card {
            width: 450px;
            background: #ffffff;
            border: 4px double var(--primary-pink);
            border-radius: 24px;
            padding: 30px;
            color: var(--text-dark);
            font-family: 'Segoe UI', sans-serif;
        }
        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed var(--primary-pink);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .receipt-header h2 {
            color: var(--primary-pink);
            font-size: 1.5rem;
        }
        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            border-bottom: 1px dotted #eee;
            padding-bottom: 4px;
        }
        .receipt-row .label {
            font-weight: bold;
            color: var(--light-pink);
        }
        .receipt-row .value {
            text-align: right;
            max-width: 60%;
            word-wrap: break-word;
        }
        .receipt-footer {
            text-align: center;
            margin-top: 25px;
            font-weight: 600;
            color: var(--primary-pink);
            font-size: 0.95rem;
            border-top: 2px dashed var(--primary-pink);
            padding-top: 15px;
        }
    </style>
</head>

        emailjs.send('service_85rii7m', 'template_5hkkk7d', formData)
            .then(function() {
                status.style.color = "var(--success-green)";
                status.textContent = "Success! Email sent. Generating your image receipt download... ✨";

                // Generate HTML structure for image receipt inside hidden div
                const targetDisplay = document.getElementById('receiptFields');
                targetDisplay.innerHTML = '';
                for (const [title, selectedValue] of Object.entries(dataMapping)) {
                    targetDisplay.innerHTML += `
                        <div class="receipt-row">
                            <span class="label">${title}:</span>
                            <span class="value">${selectedValue}</span>
                        </div>`;
                }

                // Wait slightly for DOM injection, then take screenshot and force auto download on mobile/desktop
                setTimeout(() => {
                    const receiptCardNode = document.getElementById('receiptCard');
                    html2canvas(receiptCardNode, { scale: 2, useCORS: true }).then(canvas => {
                        const imgData = canvas.toDataURL('image/png');
                        const downloadLink = document.createElement('a');
                        downloadLink.href = imgData;
                        downloadLink.download = `Vote_Receipt_${voter.replace(/\s+/g, '_')}.png`;
                        document.body.appendChild(downloadLink);
                        downloadLink.click();
                        document.body.removeChild(downloadLink);
                        
                        status.textContent = "Done! Form sent to system & receipt image downloaded successfully! 🌸";
                        document.getElementById('surveyForm').reset();
                    }).catch(err => {
                        console.error("Receipt Image Gen Error:", err);
                        status.style.color = "#d96c6c";
                        status.textContent = "Email sent successfully, but receipt image download ran into an unexpected system bug.";
                    });
                }, 600);

            }, function(error) {
                status.style.color = "#d96c6c";
                status.textContent = "Submission error! Failed details: " + JSON.stringify(error);
                console.error("EmailJS Error details:", error);
            });
    });
</script>
